<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      background: #09090b;
      color: #fafafa;
      margin: 0;
      padding: 16px;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #1f1f23;
      padding-bottom: 10px;
    }
    .header h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 750;
      background: linear-gradient(135deg, #c084fc, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .desc {
      font-size: 11px;
      color: #a1a1aa;
      line-height: 1.5;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .field label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #d4d4d8;
    }
    input {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 8px;
      padding: 8px 12px;
      color: #fafafa;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: #9333ea;
    }
    button {
      background: linear-gradient(135deg, #a855f7, #6366f1);
      border: none;
      border-radius: 8px;
      color: white;
      padding: 9px 16px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      transition: opacity 0.2s;
      box-shadow: 0 4px 12px rgba(168, 85, 247, 0.25);
    }
    button:hover {
      opacity: 0.95;
    }
    button:active {
      transform: scale(0.98);
    }
    #status {
      font-size: 11px;
      text-align: center;
      padding: 8px;
      border-radius: 8px;
    }
    .success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: #34d399;
    }
    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #f87171;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path>
        <path d="M2 12h20"></path>
      </svg>
      <h3>AI Job Assistant</h3>
    </div>
    
    <p class="desc">
      Browse job listings normally on LinkedIn, Indeed, and Naukri. The assistant will passively detect vacancies and sync them to your shared pool.
    </p>

    <div class="field">
      <label for="token">Access Token</label>
      <input type="password" id="token" placeholder="Paste connection token from Settings..." />
    </div>

    <div class="field">
      <label for="apiUrl">API URL Override</label>
      <input type="text" id="apiUrl" value="http://localhost:3001" placeholder="http://localhost:3001" />
    </div>

    <button id="save">Connect Assistant</button>
    <div id="status" style="display: none;"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
