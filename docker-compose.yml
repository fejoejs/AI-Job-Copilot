version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: ai_copilot_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=ai_job_copilot

  redis:
    image: redis:alpine
    container_name: ai_copilot_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
